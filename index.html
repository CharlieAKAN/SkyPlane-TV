<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Preconnect to speed up font load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter font with display=swap so text is never invisible while loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />

    <!-- Primary SEO -->
    <title>SkySpotting TV — Live Aviation &amp; Plane Spotting Streams</title>
    <meta name="description" content="Watch live plane spotting streams from airports around the world. Real-time flight maps, airport weather (METAR), and ATC action — all in one place. Your 24/7 aviation TV guide." />
    <meta name="keywords" content="plane spotting, live aviation, flight tracker, airport live stream, ATC, METAR, FlightRadar, LAX, LHR, LAS, ORD, plane spotting TV, SkySpotting" />
    <meta name="author" content="CharlieAKAN" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://skyspotting.live/" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SkySpotting TV" />
    <meta property="og:title" content="SkySpotting TV — Live Plane Spotting Streams &amp; Flight Tracker" />
    <meta property="og:description" content="Watch live plane spotting streams from airports around the world. Real-time flight maps, airport weather, and ATC action — all in one place." />
    <meta property="og:url" content="https://skyspotting.live/" />
    <meta property="og:image" content="https://skyspotting.live/sstv_banner.jpg" />
    <meta property="og:image:alt" content="SkySpotting TV — Live Aviation Streams" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkySpotting TV — Live Plane Spotting Streams" />
    <meta name="twitter:description" content="Live plane spotting streams, real-time flight maps, and airport weather from airports worldwide. Your 24/7 aviation TV guide." />
    <meta name="twitter:image" content="https://skyspotting.live/sstv_banner.jpg" />
    <meta name="twitter:image:alt" content="SkySpotting TV — Live Aviation Streams" />
    <meta name="twitter:creator" content="@CharlieAKAN" />
    <meta name="twitter:site" content="@CharlieAKAN" />

    <!-- Theme color (browser chrome on mobile) -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SkySpotting TV",
        "url": "https://skyspotting.live/",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "All",
        "description": "Live plane spotting streams, real-time flight maps, and airport weather from airports worldwide.",
        "image": "https://skyspotting.live/sstv_banner.jpg",
        "creator": {
          "@type": "Person",
          "name": "CharlieAKAN"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
